name: universal-agent-memory

services:
  memory-server:
    build:
      context: .
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
      UAM_API_KEY: ${UAM_API_KEY:-}
      UAM_QDRANT_URL: ${UAM_QDRANT_URL:-}
      UAM_EMBEDDING_DIM: ${UAM_EMBEDDING_DIM:-1536}
    ports: ["8080:8080"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: memory_admin
      POSTGRES_PASSWORD: memory
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_admin -d memory"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
    command: ["python", "scripts/migrate.py"]
    environment:
      UAM_ADMIN_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  qdrant:
    profiles: ["advanced"]
    image: qdrant/qdrant:v1.12.6
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    profiles: ["advanced"]
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: change-me
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data

  nats:
    profiles: ["advanced"]
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports: ["4222:4222", "8222:8222"]
    volumes:
      - nats_data:/data

  outbox-relay:
    profiles: ["advanced"]
    build:
      context: .
    command: ["python", "-m", "memory_plane.workers.outbox_main"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_NATS_URL: nats://nats:4222
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: unless-stopped

  backup:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/backup.py", "/backups/uam.dump"]
    environment:
      UAM_BACKUP_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
    volumes:
      - ./backups:/backups
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  restore:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/restore.py", "/backups/uam.dump"]
    environment:
      UAM_RESTORE_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  vault-export:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/export_vault.py", "/vault"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
    volumes:
      - ./vault:/vault
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  vault-import:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/import_vault.py", "/vault"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
    volumes:
      - ./vault:/vault
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  nats_data:
