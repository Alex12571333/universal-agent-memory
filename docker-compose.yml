name: universal-agent-memory

services:
  memory-server:
    build:
      context: .
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
      UAM_API_KEY: ${UAM_API_KEY:-}
      UAM_CONTEXT_BUDGET_TOKENS: ${UAM_CONTEXT_BUDGET_TOKENS:-131072}
      UAM_CONTEXT_PER_LAYER_LIMIT: ${UAM_CONTEXT_PER_LAYER_LIMIT:-1000}
      UAM_QDRANT_URL: ${UAM_QDRANT_URL:-}
      UAM_EMBEDDING_PROVIDER: ${UAM_EMBEDDING_PROVIDER:-fake}
      UAM_EMBEDDING_MODEL: ${UAM_EMBEDDING_MODEL:-fake-embed-v1}
      UAM_EMBEDDING_DIM: ${UAM_EMBEDDING_DIM:-1536}
      UAM_EMBEDDING_BASE_URL: ${UAM_EMBEDDING_BASE_URL:-}
      UAM_EMBEDDING_API_KEY: ${UAM_EMBEDDING_API_KEY:-}
      UAM_MEMORY_LLM_PROVIDER: ${UAM_MEMORY_LLM_PROVIDER:-spark}
      UAM_MEMORY_LLM_MODEL: ${UAM_MEMORY_LLM_MODEL:-qwen3.6-35b-a3b}
      UAM_MEMORY_LLM_BASE_URL: ${UAM_MEMORY_LLM_BASE_URL:-http://192.168.0.10:8000/v1}
      UAM_MEMORY_LLM_API_KEY: ${UAM_MEMORY_LLM_API_KEY:-}
      UAM_MEMORY_LLM_TIMEOUT_SECONDS: ${UAM_MEMORY_LLM_TIMEOUT_SECONDS:-120}
      UAM_MEMORY_LLM_TEMPERATURE: ${UAM_MEMORY_LLM_TEMPERATURE:-0.1}
      UAM_MEMORY_LLM_CONTEXT_TOKENS: ${UAM_MEMORY_LLM_CONTEXT_TOKENS:-131072}
      UAM_MEMORY_LLM_MAX_TOKENS: ${UAM_MEMORY_LLM_MAX_TOKENS:-1600}
      UAM_MEMORY_LLM_ENABLE_THINKING: ${UAM_MEMORY_LLM_ENABLE_THINKING:-false}
    ports: ["6798:8080"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: memory_admin
      POSTGRES_PASSWORD: memory
    ports: ["6548:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_admin -d memory"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
    command: ["python", "scripts/migrate.py"]
    environment:
      UAM_ADMIN_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  qdrant:
    profiles: ["advanced"]
    image: qdrant/qdrant:v1.12.6
    ports: ["6799:6333", "6800:6334"]
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    profiles: ["advanced"]
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: change-me
    ports: ["6900:9000", "6901:9001"]
    volumes:
      - minio_data:/data

  nats:
    profiles: ["advanced"]
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports: ["6422:4222", "6822:8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  outbox-relay:
    profiles: ["advanced"]
    build:
      context: .
    command: ["python", "-m", "memory_plane.workers.outbox_main"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_NATS_URL: nats://nats:4222
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    restart: unless-stopped

  embedding-worker:
    profiles: ["advanced"]
    build:
      context: .
    command: ["python", "-m", "memory_plane.workers.embedding_main"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
      UAM_NATS_URL: nats://nats:4222
      UAM_QDRANT_URL: ${UAM_QDRANT_URL:-http://qdrant:6333}
      UAM_EMBEDDING_PROVIDER: ${UAM_EMBEDDING_PROVIDER:-fake}
      UAM_EMBEDDING_MODEL: ${UAM_EMBEDDING_MODEL:-fake-embed-v1}
      UAM_EMBEDDING_DIM: ${UAM_EMBEDDING_DIM:-1536}
      UAM_EMBEDDING_BASE_URL: ${UAM_EMBEDDING_BASE_URL:-}
      UAM_EMBEDDING_API_KEY: ${UAM_EMBEDDING_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  backup:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/backup.py", "/backups/uam.dump"]
    environment:
      UAM_BACKUP_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
    volumes:
      - ./backups:/backups
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  restore:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/restore.py", "/backups/uam.dump"]
    environment:
      UAM_RESTORE_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  vault-export:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/export_vault.py", "/vault"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
    volumes:
      - ./vault:/vault
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  vault-import:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/import_vault.py", "/vault"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
    volumes:
      - ./vault:/vault
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  nats_data:
