name: universal-agent-memory

services:
  memory-server:
    build:
      context: .
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_ENFORCE_RUNTIME_DB_ACL: "true"
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
      UAM_VERSION: ${UAM_VERSION:-0.1.0}
      UAM_SOURCE_COMMIT: ${UAM_SOURCE_COMMIT:-unknown}
      UAM_IMAGE_DIGEST: ${UAM_IMAGE_DIGEST:-unknown}
      UAM_DEPLOYMENT_ID: ${UAM_DEPLOYMENT_ID:-local-development}
      UAM_BUILD_TIME: ${UAM_BUILD_TIME:-unknown}
      UAM_API_KEY: ${UAM_API_KEY:-}
      UAM_API_KEYS: ${UAM_API_KEYS:-}
      UAM_API_PRINCIPAL_BINDINGS_JSON: ${UAM_API_PRINCIPAL_BINDINGS_JSON:-}
      UAM_REQUIRE_IDENTITY_BINDINGS: ${UAM_REQUIRE_IDENTITY_BINDINGS:-false}
      UAM_UI_SESSION_SIGNING_KEY: ${UAM_UI_SESSION_SIGNING_KEY:-}
      UAM_UI_SESSION_TTL_SECONDS: ${UAM_UI_SESSION_TTL_SECONDS:-28800}
      UAM_UI_COOKIE_SECURE: ${UAM_UI_COOKIE_SECURE:-false}
      UAM_CONVERSATION_CURATED_ONLY_TTL_SECONDS: ${UAM_CONVERSATION_CURATED_ONLY_TTL_SECONDS:-86400}
      UAM_CONTEXT_BUDGET_TOKENS: ${UAM_CONTEXT_BUDGET_TOKENS:-8192}
      UAM_CONTEXT_PER_LAYER_LIMIT: ${UAM_CONTEXT_PER_LAYER_LIMIT:-1000}
      # Local Compose remains opt-in; set pgcrypto + one stable key before
      # running scripts/reencrypt_legacy_pgcrypto.py against existing data.
      UAM_MEMORY_TEXT_ENCRYPTION: ${UAM_MEMORY_TEXT_ENCRYPTION:-off}
      UAM_MEMORY_TEXT_ENCRYPTION_SCOPES: ${UAM_MEMORY_TEXT_ENCRYPTION_SCOPES:-all}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY:-}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE:-}
      UAM_QDRANT_URL: ${UAM_QDRANT_URL:-}
      UAM_QDRANT_COLLECTION: ${UAM_QDRANT_COLLECTION:-memory_items}
      UAM_EMBEDDING_PROVIDER: ${UAM_EMBEDDING_PROVIDER:-fake}
      UAM_EMBEDDING_MODEL: ${UAM_EMBEDDING_MODEL:-fake-embed-v1}
      UAM_EMBEDDING_DIM: ${UAM_EMBEDDING_DIM:-1536}
      UAM_EMBEDDING_BASE_URL: ${UAM_EMBEDDING_BASE_URL:-}
      UAM_EMBEDDING_SEND_DIMENSIONS: ${UAM_EMBEDDING_SEND_DIMENSIONS:-false}
      UAM_EMBEDDING_API_KEY: ${UAM_EMBEDDING_API_KEY:-}
      UAM_MEMORY_LLM_PROVIDER: ${UAM_MEMORY_LLM_PROVIDER:-openai-compatible}
      UAM_MEMORY_LLM_MODEL: ${UAM_MEMORY_LLM_MODEL:-memory-model}
      UAM_MEMORY_LLM_BASE_URL: ${UAM_MEMORY_LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      UAM_MEMORY_LLM_API_KEY: ${UAM_MEMORY_LLM_API_KEY:-}
      UAM_MEMORY_LLM_TIMEOUT_SECONDS: ${UAM_MEMORY_LLM_TIMEOUT_SECONDS:-60}
      UAM_MEMORY_LLM_TEMPERATURE: ${UAM_MEMORY_LLM_TEMPERATURE:-0.1}
      UAM_MEMORY_LLM_CONTEXT_TOKENS: ${UAM_MEMORY_LLM_CONTEXT_TOKENS:-8192}
      UAM_MEMORY_LLM_MAX_TOKENS: ${UAM_MEMORY_LLM_MAX_TOKENS:-1200}
      UAM_MEMORY_LLM_EXTRA_BODY_JSON: ${UAM_MEMORY_LLM_EXTRA_BODY_JSON:-}
      UAM_MODEL_ENDPOINT_ALLOWLIST: ${UAM_MODEL_ENDPOINT_ALLOWLIST:-}
      UAM_MODEL_SETTINGS_PATH: /var/lib/obelisk/model-settings.json
      # Disabled by default so the basic local profile stays fail-soft when the
      # optional advanced services are absent. Set true for an advanced runtime
      # verification or an appliance deployment with NATS and the worker.
      UAM_RUNTIME_DEPENDENCY_PROBES: ${UAM_RUNTIME_DEPENDENCY_PROBES:-false}
      UAM_REQUIRED_WORKERS: ${UAM_REQUIRED_WORKERS:-}
      UAM_WORKER_HEARTBEAT_TTL_SECONDS: ${UAM_WORKER_HEARTBEAT_TTL_SECONDS:-30}
    ports: ["6798:8080"]
    volumes:
      - model_settings_data:/var/lib/obelisk
    depends_on:
      migrate:
        condition: service_completed_successfully
      model-settings-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/ready')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: memory_admin
      POSTGRES_PASSWORD: memory
    ports: ["6548:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_admin -d memory"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
    command: ["python", "scripts/migrate.py"]
    environment:
      UAM_ADMIN_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
      UAM_APP_DB_USER: memory_app
      UAM_APP_DB_PASSWORD: memory
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  model-settings-init:
    build:
      context: .
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /var/lib/obelisk && chown 10001:10001 /var/lib/obelisk"]
    volumes:
      - model_settings_data:/var/lib/obelisk
    restart: "no"

  qdrant:
    profiles: ["advanced"]
    image: qdrant/qdrant:v1.12.6
    ports: ["6799:6333", "6800:6334"]
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    profiles: ["advanced"]
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: change-me
    ports: ["6900:9000", "6901:9001"]
    volumes:
      - minio_data:/data

  nats:
    profiles: ["advanced"]
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports: ["6422:4222", "6822:8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  outbox-relay:
    profiles: ["advanced"]
    build:
      context: .
    command: ["python", "-m", "memory_plane.workers.outbox_main"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_ENFORCE_RUNTIME_DB_ACL: "true"
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_NATS_URL: nats://nats:4222
      # The relay reads canonical outbox payloads. It needs the same pgcrypto
      # configuration as API and consumers before it can publish an event.
      UAM_MEMORY_TEXT_ENCRYPTION: ${UAM_MEMORY_TEXT_ENCRYPTION:-off}
      UAM_MEMORY_TEXT_ENCRYPTION_SCOPES: ${UAM_MEMORY_TEXT_ENCRYPTION_SCOPES:-all}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY:-}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE:-}
      UAM_WORKER_HEARTBEAT_SECONDS: ${UAM_WORKER_HEARTBEAT_SECONDS:-5}
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    restart: unless-stopped

  embedding-worker:
    profiles: ["advanced"]
    build:
      context: .
    command: ["python", "-m", "memory_plane.workers.embedding_main"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_ENFORCE_RUNTIME_DB_ACL: "true"
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
      UAM_NATS_URL: nats://nats:4222
      UAM_QDRANT_URL: ${UAM_QDRANT_URL:-http://qdrant:6333}
      UAM_QDRANT_COLLECTION: ${UAM_QDRANT_COLLECTION:-memory_items}
      UAM_MEMORY_TEXT_ENCRYPTION: ${UAM_MEMORY_TEXT_ENCRYPTION:-off}
      UAM_MEMORY_TEXT_ENCRYPTION_SCOPES: ${UAM_MEMORY_TEXT_ENCRYPTION_SCOPES:-all}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY:-}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE:-}
      UAM_EMBEDDING_PROVIDER: ${UAM_EMBEDDING_PROVIDER:-fake}
      UAM_EMBEDDING_MODEL: ${UAM_EMBEDDING_MODEL:-fake-embed-v1}
      UAM_EMBEDDING_DIM: ${UAM_EMBEDDING_DIM:-1536}
      UAM_EMBEDDING_BASE_URL: ${UAM_EMBEDDING_BASE_URL:-}
      UAM_EMBEDDING_SEND_DIMENSIONS: ${UAM_EMBEDDING_SEND_DIMENSIONS:-false}
      UAM_EMBEDDING_API_KEY: ${UAM_EMBEDDING_API_KEY:-}
      UAM_WORKER_METRICS_PORT: ${UAM_WORKER_METRICS_PORT:-9091}
      UAM_WORKER_HEARTBEAT_SECONDS: ${UAM_WORKER_HEARTBEAT_SECONDS:-5}
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  maintenance-worker:
    profiles: ["advanced"]
    build:
      context: .
    command: ["python", "-m", "memory_plane.workers.maintenance_main"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_ENFORCE_RUNTIME_DB_ACL: "true"
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
      UAM_NATS_URL: nats://nats:4222
      # The worker reads encrypted raw-turn metadata before it can create an
      # evidence-linked proposal. Keep this aligned with API and relay.
      UAM_MEMORY_TEXT_ENCRYPTION: ${UAM_MEMORY_TEXT_ENCRYPTION:-off}
      UAM_MEMORY_TEXT_ENCRYPTION_SCOPES: ${UAM_MEMORY_TEXT_ENCRYPTION_SCOPES:-all}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY:-}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE:-}
      UAM_WORKER_HEARTBEAT_SECONDS: ${UAM_WORKER_HEARTBEAT_SECONDS:-5}
      # The curator is a maintenance consumer, so it needs the same bounded
      # OpenAI-compatible model configuration as the API. It still writes only
      # evidence-linked proposals unless the narrow auto-accept policy passes.
      UAM_MEMORY_LLM_PROVIDER: ${UAM_MEMORY_LLM_PROVIDER:-openai-compatible}
      UAM_MEMORY_LLM_MODEL: ${UAM_MEMORY_LLM_MODEL:-memory-model}
      UAM_MEMORY_LLM_BASE_URL: ${UAM_MEMORY_LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      UAM_MEMORY_LLM_API_KEY: ${UAM_MEMORY_LLM_API_KEY:-}
      UAM_MEMORY_LLM_TIMEOUT_SECONDS: ${UAM_MEMORY_LLM_TIMEOUT_SECONDS:-60}
      UAM_MEMORY_LLM_TEMPERATURE: ${UAM_MEMORY_LLM_TEMPERATURE:-0.1}
      UAM_MEMORY_LLM_CONTEXT_TOKENS: ${UAM_MEMORY_LLM_CONTEXT_TOKENS:-8192}
      UAM_MEMORY_LLM_MAX_TOKENS: ${UAM_MEMORY_LLM_MAX_TOKENS:-1200}
      UAM_MEMORY_LLM_EXTRA_BODY_JSON: ${UAM_MEMORY_LLM_EXTRA_BODY_JSON:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    restart: unless-stopped

  backup:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/backup.py", "/backups/uam.dump"]
    environment:
      UAM_BACKUP_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
    volumes:
      - ./backups:/backups
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  restore:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/restore.py", "/backups/uam.dump"]
    environment:
      UAM_RESTORE_DATABASE_URL: postgresql://memory_admin:memory@postgres:5432/memory
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  vault-export:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/export_vault.py", "/vault"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_ENFORCE_RUNTIME_DB_ACL: "true"
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
    volumes:
      - ./vault:/vault
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  vault-import:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/import_vault.py", "/vault"]
    environment:
      UAM_DATABASE_URL: postgresql://memory_app:memory@postgres:5432/memory
      UAM_ENFORCE_RUNTIME_DB_ACL: "true"
      UAM_SERVER_ID: 00000000-0000-0000-0000-000000000001
      UAM_PROJECT_ID: 00000000-0000-0000-0000-000000000002
    volumes:
      - ./vault:/vault
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  model_settings_data:
  nats_data:
