name: obelisk-memory

services:
  memory-server:
    build:
      context: .
    environment:
      UAM_DATABASE_HOST: postgres
      UAM_DATABASE_PORT: 5432
      UAM_DATABASE_NAME: ${POSTGRES_DB}
      UAM_DATABASE_USER: ${UAM_APP_DB_USER}
      UAM_DATABASE_PASSWORD_FILE: /run/secrets/app_db_password
      UAM_SERVER_ID: ${UAM_SERVER_ID}
      UAM_PROJECT_ID: ${UAM_PROJECT_ID}
      UAM_VERSION: ${UAM_VERSION}
      UAM_SOURCE_COMMIT: ${UAM_SOURCE_COMMIT}
      UAM_IMAGE_DIGEST: ${UAM_IMAGE_DIGEST}
      UAM_DEPLOYMENT_ID: ${UAM_DEPLOYMENT_ID}
      UAM_BUILD_TIME: ${UAM_BUILD_TIME}
      UAM_API_KEY: ${UAM_API_KEY:-}
      UAM_API_KEY_FILE: ${UAM_API_KEY_FILE:-}
      UAM_API_KEYS: ${UAM_API_KEYS:-}
      UAM_API_KEYS_FILE: ${UAM_API_KEYS_FILE:-}
      UAM_UI_SESSION_SIGNING_KEY_FILE: /run/secrets/ui_session_signing_key
      UAM_UI_SESSION_TTL_SECONDS: ${UAM_UI_SESSION_TTL_SECONDS:-28800}
      UAM_UI_COOKIE_SECURE: ${UAM_UI_COOKIE_SECURE:-true}
      UAM_CONVERSATION_CURATED_ONLY_TTL_SECONDS: ${UAM_CONVERSATION_CURATED_ONLY_TTL_SECONDS:-86400}
      UAM_API_PRINCIPAL_BINDINGS_JSON: ${UAM_API_PRINCIPAL_BINDINGS_JSON:-}
      UAM_API_PRINCIPAL_BINDINGS_JSON_FILE: ${UAM_API_PRINCIPAL_BINDINGS_JSON_FILE:-}
      UAM_REQUIRE_IDENTITY_BINDINGS: ${UAM_REQUIRE_IDENTITY_BINDINGS:-true}
      UAM_CONTEXT_BUDGET_TOKENS: ${UAM_CONTEXT_BUDGET_TOKENS:-131072}
      UAM_CONTEXT_PER_LAYER_LIMIT: ${UAM_CONTEXT_PER_LAYER_LIMIT:-1000}
      UAM_PRIVACY_ENABLED: ${UAM_PRIVACY_ENABLED:-true}
      UAM_PRIVACY_ACTION: ${UAM_PRIVACY_ACTION:-redact}
      UAM_MEMORY_TEXT_ENCRYPTION: ${UAM_MEMORY_TEXT_ENCRYPTION:-pgcrypto}
      UAM_MEMORY_TEXT_ENCRYPTION_SCOPES: ${UAM_MEMORY_TEXT_ENCRYPTION_SCOPES:-all}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY:-}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE:-}
      UAM_QDRANT_URL: http://qdrant:6333
      UAM_QDRANT_COLLECTION: ${UAM_QDRANT_COLLECTION:-memory_items}
      UAM_QDRANT_PAYLOAD_TEXT: ${UAM_QDRANT_PAYLOAD_TEXT:-false}
      UAM_EMBEDDING_PROVIDER: ${UAM_EMBEDDING_PROVIDER:-openai-compatible}
      UAM_EMBEDDING_MODEL: ${UAM_EMBEDDING_MODEL:?UAM_EMBEDDING_MODEL must be set}
      UAM_EMBEDDING_DIM: ${UAM_EMBEDDING_DIM:?UAM_EMBEDDING_DIM must be set}
      UAM_EMBEDDING_BASE_URL: ${UAM_EMBEDDING_BASE_URL:?UAM_EMBEDDING_BASE_URL must be set}
      UAM_EMBEDDING_SEND_DIMENSIONS: ${UAM_EMBEDDING_SEND_DIMENSIONS:-false}
      UAM_EMBEDDING_API_KEY: ${UAM_EMBEDDING_API_KEY:-}
      UAM_EMBEDDING_API_KEY_FILE: ${UAM_EMBEDDING_API_KEY_FILE:-}
      UAM_MEMORY_LLM_PROVIDER: ${UAM_MEMORY_LLM_PROVIDER:-openai-compatible}
      UAM_MEMORY_LLM_MODEL: ${UAM_MEMORY_LLM_MODEL:?UAM_MEMORY_LLM_MODEL must be set}
      UAM_MEMORY_LLM_BASE_URL: ${UAM_MEMORY_LLM_BASE_URL:?UAM_MEMORY_LLM_BASE_URL must be set}
      UAM_MEMORY_LLM_API_KEY: ${UAM_MEMORY_LLM_API_KEY:-}
      UAM_MEMORY_LLM_API_KEY_FILE: ${UAM_MEMORY_LLM_API_KEY_FILE:-}
      UAM_MEMORY_LLM_TIMEOUT_SECONDS: ${UAM_MEMORY_LLM_TIMEOUT_SECONDS:-60}
      UAM_MEMORY_LLM_TEMPERATURE: ${UAM_MEMORY_LLM_TEMPERATURE:-0.1}
      UAM_MEMORY_LLM_CONTEXT_TOKENS: ${UAM_MEMORY_LLM_CONTEXT_TOKENS:-131072}
      UAM_MEMORY_LLM_MAX_TOKENS: ${UAM_MEMORY_LLM_MAX_TOKENS:-1600}
      UAM_MEMORY_LLM_EXTRA_BODY_JSON: ${UAM_MEMORY_LLM_EXTRA_BODY_JSON:-}
      UAM_MODEL_ENDPOINT_ALLOWLIST: ${UAM_MODEL_ENDPOINT_ALLOWLIST:?UAM_MODEL_ENDPOINT_ALLOWLIST must be set}
    ports:
      - "6798:8080"
    secrets:
      - app_db_password
      - ui_session_signing_key
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/ready')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
    command: ["python", "scripts/migrate.py"]
    environment:
      UAM_ADMIN_DATABASE_HOST: postgres
      UAM_ADMIN_DATABASE_PORT: 5432
      UAM_ADMIN_DATABASE_NAME: ${POSTGRES_DB}
      UAM_ADMIN_DATABASE_USER: ${POSTGRES_USER}
      UAM_ADMIN_DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
      UAM_APP_DB_USER: ${UAM_APP_DB_USER}
      UAM_APP_DB_PASSWORD_FILE: /run/secrets/app_db_password
    secrets:
      - postgres_password
      - app_db_password
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  outbox-relay:
    build:
      context: .
    command: ["python", "-m", "memory_plane.workers.outbox_main"]
    environment:
      UAM_DATABASE_HOST: postgres
      UAM_DATABASE_PORT: 5432
      UAM_DATABASE_NAME: ${POSTGRES_DB}
      UAM_DATABASE_USER: ${UAM_APP_DB_USER}
      UAM_DATABASE_PASSWORD_FILE: /run/secrets/app_db_password
      UAM_SERVER_ID: ${UAM_SERVER_ID}
      UAM_NATS_URL: nats://nats:4222
    secrets:
      - app_db_password
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    restart: unless-stopped

  embedding-worker:
    build:
      context: .
    command: ["python", "-m", "memory_plane.workers.embedding_main"]
    environment:
      UAM_DATABASE_HOST: postgres
      UAM_DATABASE_PORT: 5432
      UAM_DATABASE_NAME: ${POSTGRES_DB}
      UAM_DATABASE_USER: ${UAM_APP_DB_USER}
      UAM_DATABASE_PASSWORD_FILE: /run/secrets/app_db_password
      UAM_SERVER_ID: ${UAM_SERVER_ID}
      UAM_PROJECT_ID: ${UAM_PROJECT_ID}
      UAM_NATS_URL: nats://nats:4222
      UAM_QDRANT_URL: http://qdrant:6333
      UAM_QDRANT_COLLECTION: ${UAM_QDRANT_COLLECTION:-memory_items}
      UAM_QDRANT_PAYLOAD_TEXT: ${UAM_QDRANT_PAYLOAD_TEXT:-false}
      UAM_MEMORY_TEXT_ENCRYPTION: ${UAM_MEMORY_TEXT_ENCRYPTION:-pgcrypto}
      UAM_MEMORY_TEXT_ENCRYPTION_SCOPES: ${UAM_MEMORY_TEXT_ENCRYPTION_SCOPES:-all}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY:-}
      UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE: ${UAM_MEMORY_TEXT_ENCRYPTION_KEY_FILE:-}
      UAM_EMBEDDING_PROVIDER: ${UAM_EMBEDDING_PROVIDER:-openai-compatible}
      UAM_EMBEDDING_MODEL: ${UAM_EMBEDDING_MODEL:?UAM_EMBEDDING_MODEL must be set}
      UAM_EMBEDDING_DIM: ${UAM_EMBEDDING_DIM:?UAM_EMBEDDING_DIM must be set}
      UAM_EMBEDDING_BASE_URL: ${UAM_EMBEDDING_BASE_URL:?UAM_EMBEDDING_BASE_URL must be set}
      UAM_EMBEDDING_SEND_DIMENSIONS: ${UAM_EMBEDDING_SEND_DIMENSIONS:-false}
      UAM_EMBEDDING_API_KEY: ${UAM_EMBEDDING_API_KEY:-}
      UAM_EMBEDDING_API_KEY_FILE: ${UAM_EMBEDDING_API_KEY_FILE:-}
      UAM_WORKER_METRICS_PORT: ${UAM_WORKER_METRICS_PORT:-9091}
    secrets:
      - app_db_password
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backup:
    profiles: ["ops"]
    build:
      context: .
    command: ["python", "scripts/scheduled_backup.py", "--skip-restore-drill"]
    environment:
      UAM_BACKUP_DATABASE_HOST: postgres
      UAM_BACKUP_DATABASE_PORT: 5432
      UAM_BACKUP_DATABASE_NAME: ${POSTGRES_DB}
      UAM_BACKUP_DATABASE_USER: ${POSTGRES_USER}
      UAM_BACKUP_DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
      UAM_BACKUP_ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      UAM_BACKUP_DIR: /backups
      UAM_BACKUP_REPORT: /backups/latest-backup-report.json
    volumes:
      - ./backups:/backups
    secrets:
      - postgres_password
      - backup_encryption_key
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  postgres_data:
  qdrant_data:
  nats_data:
  minio_data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:?POSTGRES_PASSWORD_FILE must point to a host secret file}
  app_db_password:
    file: ${UAM_APP_DB_PASSWORD_FILE:?UAM_APP_DB_PASSWORD_FILE must point to a host secret file}
  ui_session_signing_key:
    file: ${UAM_UI_SESSION_SIGNING_KEY_FILE:?UAM_UI_SESSION_SIGNING_KEY_FILE must point to a host secret file}
  backup_encryption_key:
    file: ${UAM_BACKUP_ENCRYPTION_KEY_FILE:?UAM_BACKUP_ENCRYPTION_KEY_FILE must point to a host secret file}
