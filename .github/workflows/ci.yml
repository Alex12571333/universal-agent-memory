name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: memory
          POSTGRES_USER: memory_admin
          POSTGRES_PASSWORD: memory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memory_admin -d memory"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      PYTHONPATH: src
      UAM_TEST_DATABASE_URL: postgresql://memory_app:memory@localhost:5432/memory
      UAM_ADMIN_DATABASE_URL: postgresql://memory_admin:memory@localhost:5432/memory
      UAM_TEST_NATS_URL: nats://localhost:4222

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          pip install -e ".[dev,api,postgres,nats,documents]"
          pip install -e sdk/python
      - name: Apply database schema
        run: python scripts/migrate.py
      - name: Start NATS JetStream
        run: docker run -d --name nats-test -p 4222:4222 nats:2.10-alpine -js
      - name: Test
        run: |
          pytest
          pytest sdk/python/tests
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src sdk/python/uam_client
      - name: TypeScript SDK
        run: |
          npm ci --prefix sdk/typescript
          npm test --prefix sdk/typescript
      - name: Build standalone server image
        run: docker build -t universal-agent-memory:test .
