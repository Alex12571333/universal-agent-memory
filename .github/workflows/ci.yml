name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api,postgres,qdrant,nats,s3,documents,dev]"
      - name: Lint
        run: ruff check src tests scripts agent-integrations
      - name: Tests
        run: pytest -q
      - name: Production readiness eval
        run: PYTHONPATH=src python scripts/production_readiness_eval.py
      - name: Docker compose config
        run: |
          docker compose --profile advanced config
          docker compose -f docker-compose.prod.yml --env-file .env.production.example config
          docker compose -f docker-compose.prod.yml -f deploy/reverse-proxy/docker-compose.caddy.yml --env-file .env.production.example config
      - name: Production env placeholder guard
        run: |
          if python scripts/validate_production_env.py .env.production.example --require-public-tls --require-signed-artifacts --require-real-embeddings; then
            echo ".env.production.example unexpectedly passed strict production validation"
            exit 1
          fi
      - name: Enterprise readiness static gate
        run: python scripts/enterprise_readiness_check.py --static-only

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            agent-integrations/openclaw/plugin/package-lock.json
      - name: Build web dashboard
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Check OpenClaw plugin
        working-directory: agent-integrations/openclaw/plugin
        run: |
          npm ci
          npm run check
